[build]
builder = "NIXPACKS"
# NODE_ENV=production on Railway skips devDependencies (tsup). Force dev install for the build.
buildCommand = "NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @repo/api run build"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
